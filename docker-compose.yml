services:
  backend:
    build:
      context: ./backend
    environment:
      PORT: 8080
      DATABASE_PATH: /app/data/unistep.db
      JWT_SECRET: change-me-in-production
      FRONTEND_URL: http://localhost:8088
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: unistep
      MINIO_USE_SSL: "false"
      MINIO_PUBLIC_URL: http://localhost:8088/minio
    volumes:
      - backend-data:/app/data
    depends_on:
      minio:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "8088:80"

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  backend-data:
  minio-data:
